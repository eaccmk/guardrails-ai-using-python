name: Python PII Guardrail CI

# Trigger this automation workflow on code pushes or pull requests to the main branch
on:
  pull_request:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out your code from your repository onto the GitHub runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Force install a compatible version of Python (3.14)
    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip' # Automatically caches your dependencies to speed up future runs

    # 3. Upgrade pip and install the PII Guardrails module
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install guardrails-ai-detect-pii

    # 4. Run your python file to ensure everything passes successfully
    - name: Execute PII Guardrail Script
      run: |
        python demo_pii.py
